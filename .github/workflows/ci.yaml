name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write


jobs:

################################################################################
# Detect changed services
################################################################################

  detect:
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      gateway: ${{ steps.filter.outputs.gateway }}
      auth: ${{ steps.filter.outputs.auth }}
      user: ${{ steps.filter.outputs.user }}
      analyzer: ${{ steps.filter.outputs.analyzer }}

    steps:

      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter

        with:
          filters: |

            frontend:
              - 'frontend/**'

            gateway:
              - 'api-gateway/**'

            auth:
              - 'backend/auth-service/**'

            user:
              - 'backend/user-service/**'

            analyzer:
              - 'backend/analyzer-service/**'



################################################################################
# Frontend
################################################################################

  build-frontend:

    needs: detect
    if: needs.detect.outputs.frontend == 'true'

    uses: ./.github/workflows/reusable-build.yaml

    permissions:
      contents: read
      packages: write

    with:
      service: frontend
      context: ./frontend
      dockerfile: ./frontend/Dockerfile
      image_name: stock-alert-frontend


  update-frontend:

    needs:
      - detect
      - build-frontend
    if: always() && needs.detect.outputs.frontend == 'true'

    uses: ./.github/workflows/reusable-values-update.yaml

    secrets: inherit

    with:
      service: frontend
      values_file: values/stock-alert/frontend.yaml
      image_repository: ghcr.io/rakeshh1990/stock-alert-frontend
      image_tag: ${{ needs.build-frontend.outputs.tag }}



################################################################################
# Gateway
################################################################################

  build-gateway:

    needs: detect
    if: needs.detect.outputs.gateway == 'true'

    uses: ./.github/workflows/reusable-build.yaml

    permissions:
      contents: read
      packages: write

    with:
      service: api-gateway
      context: ./api-gateway
      dockerfile: ./api-gateway/Dockerfile
      image_name: stock-alert-api-gateway


  update-gateway:

    needs:
      - detect
      - build-gateway
    if: always() && needs.detect.outputs.gateway == 'true'

    uses: ./.github/workflows/reusable-values-update.yaml

    secrets: inherit

    with:
      service: gateway
      values_file: values/stock-alert/gateway.yaml
      image_repository: ghcr.io/rakeshh1990/stock-alert-api-gateway
      image_tag: ${{ needs.build-gateway.outputs.tag }}



################################################################################
# Auth Service
################################################################################

  build-auth-service:

    needs: detect
    if: needs.detect.outputs.auth == 'true'

    uses: ./.github/workflows/reusable-build.yaml

    permissions:
      contents: read
      packages: write

    with:
      service: auth-service
      context: ./backend/auth-service
      dockerfile: ./backend/auth-service/Dockerfile
      image_name: stock-alert-auth-service


  update-auth-service:

    needs:
      - detect
      - build-auth-service
    if: always() && needs.detect.outputs.auth == 'true'

    uses: ./.github/workflows/reusable-values-update.yaml

    secrets: inherit

    with:
      service: auth-service
      values_file: values/stock-alert/auth-service.yaml
      image_repository: ghcr.io/rakeshh1990/stock-alert-auth-service
      image_tag: ${{ needs.build-auth-service.outputs.tag }}



################################################################################
# User Service
################################################################################

  build-user-service:

    needs: detect
    if: needs.detect.outputs.user == 'true'

    uses: ./.github/workflows/reusable-build.yaml

    permissions:
      contents: read
      packages: write

    with:
      service: user-service
      context: ./backend/user-service
      dockerfile: ./backend/user-service/Dockerfile
      image_name: stock-alert-user-service


  update-user-service:

    needs:
      - detect
      - build-user-service
    if: always() && needs.detect.outputs.user == 'true'

    uses: ./.github/workflows/reusable-values-update.yaml

    secrets: inherit

    with:
      service: user-service
      values_file: values/stock-alert/user-service.yaml
      image_repository: ghcr.io/rakeshh1990/stock-alert-user-service
      image_tag: ${{ needs.build-user-service.outputs.tag }}



################################################################################
# Analyzer Service
################################################################################

  build-analyzer-service:

    needs: detect
    if: needs.detect.outputs.analyzer == 'true'

    uses: ./.github/workflows/reusable-build.yaml

    permissions:
      contents: read
      packages: write

    with:
      service: analyzer-service
      context: ./backend/analyzer-service
      dockerfile: ./backend/analyzer-service/Dockerfile
      image_name: stock-alert-analyzer-service


  update-analyzer-service:

    needs:
      - detect
      - build-analyzer-service
    if: always() && needs.detect.outputs.analyzer == 'true'

    uses: ./.github/workflows/reusable-values-update.yaml

    secrets: inherit

    with:
      service: analyzer-service
      values_file: values/stock-alert/analyzer-service.yaml
      image_repository: ghcr.io/rakeshh1990/stock-alert-analyzer-service
      image_tag: ${{ needs.build-analyzer-service.outputs.tag }}
