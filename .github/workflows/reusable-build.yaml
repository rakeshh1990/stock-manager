name: Reusable Build

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      image_name:
        required: true
        type: string

    outputs:
      image:
        value: ${{ jobs.build.outputs.image }}
      tag:
        value: ${{ jobs.build.outputs.tag }}
      digest:
        value: ${{ jobs.build.outputs.digest }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Variables
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Image : ${{ steps.meta.outputs.image }}"
          echo "Tag   : ${{ steps.vars.outputs.tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"